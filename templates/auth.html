<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro — Connexion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0D1117;color:#E6EDF3;min-height:100vh;display:grid;place-items:center}
.container{width:100%;max-width:420px;padding:24px}
.logo{text-align:center;margin-bottom:40px}
.logo-icon{font-size:48px;display:block;margin-bottom:12px}
.logo h1{font-size:28px;font-weight:700;color:#58A6FF}
.logo p{color:#7D8590;font-size:14px;margin-top:4px}
.card{background:#161B22;border:1px solid #30363D;border-radius:16px;padding:32px}
.tabs{display:flex;gap:4px;margin-bottom:28px;background:#0D1117;border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;background:transparent;color:#7D8590}
.tab.active{background:#161B22;color:#E6EDF3;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:600;color:#7D8590;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;padding:12px 16px;background:#0D1117;border:1px solid #30363D;border-radius:10px;color:#E6EDF3;font-size:14px;outline:none;transition:.2s}
input:focus{border-color:#58A6FF;box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px}
.btn-primary{background:#58A6FF;color:#0D1117}
.btn-primary:hover{background:#79B8FF;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.error{background:#2D1117;border:1px solid #F85149;color:#F85149;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px}
.success{background:#122D1D;border:1px solid #3FB950;color:#3FB950;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px}
.divider{text-align:center;color:#7D8590;font-size:13px;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#30363D}
.divider::before{left:0}.divider::after{right:0}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="logo-icon">✦</span>
    <h1>TaskFlow Pro</h1>
    <p>Organise ta vie, une tâche à la fois</p>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div id="msg"></div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('login')">Connexion</button>
      <button class="tab" onclick="setTab('register')">Inscription</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Se connecter</button>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="r-username" placeholder="Ex: Jean Dupont">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="r-password" placeholder="Min. 6 caractères">
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Créer mon compte</button>
    </div>
  </div>
</div>
<script>
function setTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(t=='login'&&i==0)||(t=='register'&&i==1)));
  document.getElementById('form-login').style.display=t=='login'?'block':'none';
  document.getElementById('form-register').style.display=t=='register'?'block':'none';
  document.getElementById('msg').innerHTML='';
}
function showMsg(txt,ok){
  document.getElementById('msg').innerHTML=`<div class="${ok?'success':'error'}">${txt}</div>`;
}
async function doLogin(){
  const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:document.getElementById('l-email').value,password:document.getElementById('l-password').value})});
  const d=await r.json();
  if(d.ok) location.href='/dashboard'; else showMsg(d.msg,false);
}
async function doRegister(){
  const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('r-username').value,
      email:document.getElementById('r-email').value,password:document.getElementById('r-password').value})});
  const d=await r.json();
  if(d.ok) location.href='/dashboard'; else showMsg(d.msg,false);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=document.getElementById('form-login').style.display;v!=='none'?doLogin():doRegister();}});
</script>
</body>
</html>
